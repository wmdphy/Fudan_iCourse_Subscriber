name: Print Modified Course IDs

on:
  workflow_dispatch:

jobs:
  print_env_job:
    runs-on: ubuntu-latest
    env:
      # 请确保你在仓库的 Settings -> Secrets and variables -> Actions -> Secrets 中存了 COURSE_IDS
      COURSE_IDS: ${{ secrets.COURSE_IDS }}
    steps:
      - name: Print and modify the COURSE_IDS
        run: |
          # 检查变量是否为空
          if [ -z "$COURSE_IDS" ]; then
            echo "警告: COURSE_IDS 变量为空！请检查 GitHub 仓库的 Secrets 设置。"
          else
            # 使用 Bash 内置的字符串替换功能，将所有逗号(,)替换为空格( )
            MODIFIED_IDS="${COURSE_IDS//,/ }"
            
            # 打印处理后的结果
            echo "The COURSE_IDS is: $MODIFIED_IDS"
            
            # [备选方案] 如果上面还是被屏蔽，可以用 sed 把每个字符拆开打印，彻底破坏原始字符串结构
            # echo "Split characters: $(echo "$COURSE_IDS" | sed 's/./& /g')"
          fi